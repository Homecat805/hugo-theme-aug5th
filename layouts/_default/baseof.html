<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" theme="{{ .Site.Params.colorScheme }}">
    <head>
        {{- partial "baseof/head.html" . -}} 
    </head>
    <body>
        <div class="base-container">
            <div id="sider">
                <div class="sider-inner-container">
                    <div class="sider-inner-content-container">
                        {{- partial "sider/title.html" . -}}
                        {{- partial "sider/menu.html" . -}}
                    </div>
                </div>
            </div>
            <div id="stager">
                <header class="stage-header">
                    {{- partial "stager/logo.html" . -}}
                    <div class="container-flex-1"></div>
                    {{- partial "stager/toggle.html" . -}}
                </header>
                <div class="stage-center">
                    <div class="stage-center-inner-container">
                        {{- block "stage" . }}{{- end }}
                    </div>
                </div>
                <foot class="stage-foot">
                    {{- partial "stager/footer.html" . -}}
                </foot>
            </div>
        </div>
        <!-- Javascripts -->
        {{- partial "baseof/foot.html" . -}} 
    </body>
</html>
