<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" theme="{{ .Site.Params.colorScheme }}">
    <head>
        {{- partial "baseof/head.html" . -}} 
    </head>
    <body>

        <div id="side">
            <div class="hide-scrollbar-container-inner">
                <div class="side-content-container">
                    {{- partial "side/bar.html" . -}}
                </div>
            </div>
        </div>
        
        <div id="stage">

            {{- partial "stage/header.html" . -}}

            {{- block "stage-necker" . }}{{- end }}

            {{- block "stage-center" . }}{{- end }}

            {{- partial "stage/footer.html" . -}}

        </div>

        <!-- Javascripts -->
        {{- partial "baseof/foot.html" . -}} 
    </body>
</html>
