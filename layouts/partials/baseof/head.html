<!-- Required meta tags -->
<meta charset="utf-8" />

<!-- For responsive website -->
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- For SEO -->
<meta name="description" content="">
<meta name="keywords" content="">

<!-- Title -->
<title>{{ .Title }} ｜ {{ .Site.Title }}</title>

<!-- Favicon & icons -->
<link href={{ "./favicon.png" | relURL }} rel="icon">
<link href="{{ "./vendor/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css" | relURL }}" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" rel="stylesheet" type="text/css">
<link href="https://fonts.googleapis.com/css?family=Anonymous+Pro" rel="stylesheet">

<!-- Local CSS from SASS-->
{{ $sass := resources.Get "sass/main.scss" }}
{{ $style := $sass | resources.ToCSS (dict "targetPath" "css/main.css" ) }}
<link href="{{ $style.RelPermalink }}" rel="stylesheet" type="text/css" media="screen">
