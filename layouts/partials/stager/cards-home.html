<div class="cards">
    
    {{ with .Site.Taxonomies.tags }}

    <section class="card-container">
        <div class="card">
            <div class="card-title">Tags</div>
            <div class="card-content">
                {{ range . }}
                <a href="{{.Page.Permalink}}">{{.Page.Title}}({{.Count}})</a>
                {{ end }}
            </div>
        </div>
    </section>

    {{ end }}


</div>
